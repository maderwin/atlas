# Example services catalog
# Supports: multiple YAML URLs (comma-separated in VITE_SERVICES_YAML_URL)
#           $ref for including other YAML files
services:
  - id: app/postgres
    name: PostgreSQL
    description: Primary relational database
    url: http://postgres.example.com
    tags: [db, production]
    status_url: http://postgres.example.com/health
    links:
      - name: Dashboard
        url: http://grafana.example.com/postgres
        type: dashboard
      - name: Configuration
        url: http://postgres.example.com/config
        type: config
      - name: Logs
        url: http://logs.example.com/postgres
        type: logs
      - name: Backup
        url: s3://backup/postgres/
        type: backup
    admins:
      - name: John Smith
        username: john_smith
        url: https://t.me/john_smith

  - id: app/redis
    name: Redis
    description: In-memory cache and message broker
    url: http://redis.example.com
    tags: [db, cache, production]
    links:
      - name: Stats
        url: http://redis.example.com/stats
        type: metrics
      - name: Configuration
        url: http://redis.example.com/config
        type: config

  - id: app/nginx
    name: Nginx
    description: Reverse proxy and load balancer
    url: http://nginx.example.com
    tags: [web, proxy, production]
    links:
      - name: Configuration
        url: http://nginx.example.com/nginx.conf
        type: config
      - name: Logs
        url: http://logs.example.com/nginx
        type: logs
      - name: Docs
        url: https://nginx.org/en/docs/
        type: docs

  # Include additional services from a separate file
  - $ref: extra.yaml
