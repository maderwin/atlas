pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm oxlint {staged_files}

    - name: typecheck
      run: pnpm tsc -b --noEmit

    - name: oxfmt
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm oxfmt {staged_files}

    - name: stylelint
      glob: "*.css"
      run: pnpm stylelint {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}
